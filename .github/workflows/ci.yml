name: CI Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Lint Backend
        run: |
          cd backend
          npm run lint

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint

      - name: Test Backend
        run: |
          cd backend
          npm test

      - name: Test Frontend
        run: |
          cd frontend
          npm test

      - name: Build Backend Docker Image
        run: docker build -t edurev-backend ./backend

      - name: Build Frontend Docker Image
        run: docker build -t edurev-frontend ./frontend
