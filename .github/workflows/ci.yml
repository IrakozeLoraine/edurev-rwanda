name: CI Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: edurev
          POSTGRES_PASSWORD: edurev_pass
          POSTGRES_DB: edurev_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edurev -d edurev_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Lint Backend
        run: |
          cd backend
          npm run lint

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint

      - name: Test Backend
        run: |
          cd backend
          npm test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: edurev
          PGPASSWORD: edurev_pass
          PGDATABASE: edurev_test
          JWT_SECRET: test-secret

      - name: Test Frontend
        run: |
          cd frontend
          npm test

      - name: Build Backend Docker Image
        run: docker build -t edurev-backend ./backend

      - name: Build Frontend Docker Image
        run: docker build -t edurev-frontend ./frontend