name: CI Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ secrets.CI_PGUSER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_PGPASSWORD }}
          POSTGRES_DB: ${{ secrets.CI_PGDATABASE }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.set-images.outputs.backend_image }}
      frontend_image: ${{ steps.set-images.outputs.frontend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint backend
        run: |
          cd backend
          npm run lint

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Test backend
        run: |
          cd backend
          npm test -- --runInBand

      - name: Test frontend
        run: |
          cd frontend
          npm test -- --watch=false

      - name: Build backend Docker image
        run: |
          docker build \
            -t $IMAGE_BACKEND:ci-${{ github.sha }} \
            ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            -t $IMAGE_FRONTEND:ci-${{ github.sha }} \
            ./frontend

      - name: Set image outputs
        id: set-images
        run: |
          echo "backend_image=$IMAGE_BACKEND:ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$IMAGE_FRONTEND:ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  security_scans:
    runs-on: ubuntu-latest
    needs: build_and_test

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull backend image
        run: |
          docker pull ${{ needs.build_and_test.outputs.backend_image }} || echo "Image present from previous job runner"

      - name: Pull frontend image
        run: |
          docker pull ${{ needs.build_and_test.outputs.frontend_image }} || echo "Image present from previous job runner"

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ needs.build_and_test.outputs.backend_image }}'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload backend Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend.sarif'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ needs.build_and_test.outputs.frontend_image }}'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload frontend Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend.sarif'

      - name: Run tfsec on Terraform
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          soft_fail: false

  publish_images:
    runs-on: ubuntu-latest
    needs: security_scans

    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          echo "${{ github.token }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Pull backend image from previous job
        run: |
          docker pull ${{ needs.build_and_test.outputs.backend_image }} || echo "Image present from previous steps"

      - name: Pull frontend image from previous job
        run: |
          docker pull ${{ needs.build_and_test.outputs.frontend_image }} || echo "Image present from previous steps"

      - name: Push backend image to GHCR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          docker push ${{ needs.build_and_test.outputs.backend_image }}

      - name: Push frontend image to GHCR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          docker push ${{ needs.build_and_test.outputs.frontend_image }}
