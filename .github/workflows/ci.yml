name: CI Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  
jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.set-images.outputs.backend_image }}
      frontend_image: ${{ steps.set-images.outputs.frontend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          echo "IMAGE_BACKEND=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=ghcr.io/${GITHUB_REPOSITORY,,}/frontend" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint backend
        run: |
          cd backend
          npm run lint

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Test backend
        run: |
          cd backend
          npm test -- --runInBand

      - name: Test frontend
        run: |
          cd frontend
          npm test -- --watch=false

      - name: Build backend Docker image
        run: |
          docker build \
            -t $IMAGE_BACKEND:ci-${{ github.sha }} \
            ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            -t $IMAGE_FRONTEND:ci-${{ github.sha }} \
            ./frontend

      - name: Set image outputs
        id: set-images
        run: |
          echo "backend_image=$IMAGE_BACKEND:ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$IMAGE_FRONTEND:ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.IMAGE_BACKEND }}:ci-${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          vuln-type: 'library'
          exit-code: '1'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.IMAGE_FRONTEND }}:ci-${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          vuln-type: 'library'
          exit-code: '1'

      - name: Run tfsec on Terraform
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          soft_fail: false

      - name: Login to GitHub Container Registry
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          echo "${{ github.token }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Push backend image to GHCR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          docker push $IMAGE_BACKEND:ci-${{ github.sha }}

      - name: Push frontend image to GHCR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          docker push $IMAGE_FRONTEND:ci-${{ github.sha }}
