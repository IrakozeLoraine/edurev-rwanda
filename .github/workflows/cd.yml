name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ── Step 1: Re-run CI checks ─────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          echo "IMAGE_BACKEND=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=ghcr.io/${GITHUB_REPOSITORY,,}/frontend" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Test backend
        run: cd backend && npm test -- --runInBand

      - name: Test frontend
        run: cd frontend && npm test -- --watch=false

      - name: Build backend Docker image
        run: |
          docker build \
            -t $IMAGE_BACKEND:ci-${{ github.sha }} \
            ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            -t $IMAGE_FRONTEND:ci-${{ github.sha }} \
            ./frontend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.IMAGE_BACKEND }}:ci-${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          scanners: 'vuln,secret'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.IMAGE_FRONTEND }}:ci-${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          scanners: 'vuln,secret'

      - name: Run tfsec on Terraform
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          soft_fail: false

  # ── Step 2: Build and push Docker images to ECR ───────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    outputs:
      backend_image: ${{ steps.images.outputs.backend }}
      frontend_image: ${{ steps.images.outputs.frontend }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/edurev-rwanda-backend:${{ github.sha }} \
                        -t $ECR_REGISTRY/edurev-rwanda-backend:latest ./backend
          docker push $ECR_REGISTRY/edurev-rwanda-backend:${{ github.sha }}
          docker push $ECR_REGISTRY/edurev-rwanda-backend:latest

      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          docker build \
            --build-arg "VITE_API_BASE_URL=$VITE_API_BASE_URL" \
            -t $ECR_REGISTRY/edurev-rwanda-frontend:${{ github.sha }} \
            -t $ECR_REGISTRY/edurev-rwanda-frontend:latest ./frontend
          docker push $ECR_REGISTRY/edurev-rwanda-frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/edurev-rwanda-frontend:latest

      - name: Set image outputs
        id: images
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          echo "backend=$ECR_REGISTRY/edurev-rwanda-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "frontend=$ECR_REGISTRY/edurev-rwanda-frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

  # ── Step 3: Deploy to app VM via Ansible ──────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Generate Ansible Inventory
        run: |
          echo "[app_server]" > ansible/inventory.ini
          echo "app-vm ansible_host=${{ secrets.APP_HOST }}" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[app_server:vars]" >> ansible/inventory.ini
          echo "ansible_user=ec2-user" >> ansible/inventory.ini
          echo "ansible_ssh_private_key_file=~/.ssh/deploy_key" >> ansible/inventory.ini
          echo "ansible_ssh_common_args=-o StrictHostKeyChecking=no -o ProxyCommand='ssh -W %h:%p -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ec2-user@${{ secrets.BASTION_HOST }}'" >> ansible/inventory.ini
          echo "ansible_python_interpreter=/usr/bin/python3.8" >> ansible/inventory.ini

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/deploy.yml

      - name: Verify Deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.CORS_ORIGIN }}/api/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Deployment verified — health check returned 200"
          else
            echo "WARNING: Health check returned $STATUS — deployment may need attention"
            exit 1
          fi

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts ansible/inventory.ini
