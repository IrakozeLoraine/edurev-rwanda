[app_server]
app-vm ansible_host={{ lookup('env', 'APP_HOST') }}

[app_server:vars]
ansible_user={{ lookup('env', 'APP_SSH_USER') }}
ansible_ssh_private_key_file={{ lookup('env', 'BASTION_KEY_PATH') }}
ansible_ssh_common_args={{ lookup('env', 'BASTION_PROXY_COMMAND') }}
ansible_python_interpreter=/usr/local/bin/python3.10