services:
  # API server
  backend:
    image: ${BACKEND_IMAGE}
    container_name: edurev-rwanda-backend
    restart: always
    ports:
      - "4500:4500"
    environment:
      PORT: 4500
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    networks:
      - frontend-backend

  # React (static build)
  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: edurev-rwanda-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - backend
    networks:
      - frontend-backend

networks:
  frontend-backend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
