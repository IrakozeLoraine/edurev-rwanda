services:

  postgres:
    image: postgres:17-alpine
    container_name: edurev-rwanda-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: edurev
      POSTGRES_PASSWORD: edurev_pass
      POSTGRES_DB: edurev_rwanda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edurev -d edurev_rwanda"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: edurev-rwanda-backend
    ports:
      - "4500:5000"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: edurev
      PGPASSWORD: edurev_pass
      PGDATABASE: edurev_rwanda
      JWT_SECRET: edurev-secret-key
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: edurev-rwanda-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
