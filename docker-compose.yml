services:

  mongo:
    image: mongo:7
    container_name: edurev-rwanda-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: edurev-rwanda-backend
    ports:
      - "4500:4500"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: edurev-rwanda-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
volumes:
  mongo_data: